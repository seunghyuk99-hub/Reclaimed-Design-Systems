name: Build catalog and READMEs

on:
  push:
    branches:
      - main
    paths:
      - "systems/**"
      - "scripts/**"
      - "README.md"
      - "package.json"
      - ".github/workflows/build_catalog.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build catalog and READMEs
        run: npm run build:catalog

      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add catalog/catalog.json README.md systems/**/README.md
          git commit -m "chore: rebuild design system catalog"
          git push
